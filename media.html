<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <title>Souvenirs du mariage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="gallery-page">
    <header class="gallery-header">
        <a class="back-link" href="index.html" aria-label="Retour à l'accueil">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 12H5m6 6-6-6 6-6" />
            </svg>
            <span>Accueil</span>
        </a>
        <p class="eyebrow">Album photo</p>
        <h1>Souvenirs de notre mariage</h1>
    </header>

    <main>
        <section class="gallery" id="gallery" aria-label="Galerie des photos du mariage"></section>
    </main>

    <dialog class="lightbox" id="lightbox" aria-label="Photo agrandie">
        <button class="icon-button close-btn" id="closeBtn" type="button" aria-label="Fermer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" />
            </svg>
        </button>
        <button class="icon-button nav-btn prev-btn" id="prevBtn" type="button" aria-label="Photo précédente">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18 9 12l6-6" />
            </svg>
        </button>
        <img src="" alt="" id="lightboxImg">
        <button class="icon-button nav-btn next-btn" id="nextBtn" type="button" aria-label="Photo suivante">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 18 6-6-6-6" />
            </svg>
        </button>
        <p class="photo-count" id="photoCount"></p>
    </dialog>

    <script src="script.js"></script>
</body>

</html>
