<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvenirs de notre mariage</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin: 2rem 0;
            color: #7ac4ff;
            font-family: "Great Vibes", cursive;
            font-size: 3rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        a {
            display: block;
            text-align: center;
            margin: 2rem;
            color: #b3e0ff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>Souvenirs de notre mariage 💙</h1>

    <div class="gallery">
        <img src="photo1.jpg" alt="Photo du mariage 1">
        <img src="photo2.jpg" alt="Photo du mariage 2">
        <img src="photo3.jpg" alt="Photo du mariage 3">
        <img src="photo4.jpg" alt="Photo du mariage 4">
    </div>

    <a href="index.html">← Retour à la page principale</a>
</body>

</html>
