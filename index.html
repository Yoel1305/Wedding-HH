<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariage de Henri & Hilarie</title>

    <!-- Polices -->
    <link
        href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap)"
        rel="stylesheet">

    <!-- Feuille de style -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="hearts-container" id="hearts-container"></div>

    <div class="container">
        <h1>Henri <span>💍</span> Hilarie</h1>
        <h2>Mariage célébré le 4 octobre 2025 à 10h (GMT)</h2>
        <div class="quote">Deux âmes, un seul amour éternel 💙</div>

        <div class="timer">
            <div class="timer-row">
                <div class="time-box">
                    <div class="number" id="years">--</div>
                    <div class="label">années</div>
                </div>
                <div class="time-box">
                    <div class="number" id="months">--</div>
                    <div class="label">mois</div>
                </div>
            </div>

            <div class="timer-row">
                <div class="time-box">
                    <div class="number" id="days">--</div>
                    <div class="label">jours</div>
                </div>
                <div class="time-box">
                    <div class="number" id="hours">--</div>
                    <div class="label">heures</div>
                </div>
                <div class="time-box">
                    <div class="number" id="minutes">--</div>
                    <div class="label">minutes</div>
                </div>
                <div class="time-box">
                    <div class="number" id="seconds">--</div>
                    <div class="label">secondes</div>
                </div>
            </div>
        </div>

        <div class="total-days" id="totalDays">Soit ... jours d’amour 💙</div>

        <button onclick="window.location.href='media.html'">Revivre cette journée magique 💙</button>
    </div>

    <!-- Musique de fond “Perfect” -->
    <iframe width="0" height="0"
        src="[youtube.com](https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1&loop=1&playlist=2Vv-BfVoq4g)"
        frameborder="0" allow="autoplay"></iframe>

    <script src="script.js"></script>
</body>

</html>
