<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <title>Mariage de Henri & Hilarie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-page">
    <div class="ambient" aria-hidden="true"></div>
    <div class="hearts-container" id="hearts-container" aria-hidden="true"></div>

    <main class="hero-shell">
        <section class="hero-copy" aria-labelledby="page-title">
            <p class="eyebrow">4 octobre 2025 · 10h GMT</p>
            <h1 id="page-title">Henri <span aria-hidden="true">💍</span> Hilarie</h1>
            <p class="quote">Deux âmes, un seul amour éternel.</p>

            <div class="timer" aria-label="Temps écoulé depuis le mariage">
                <div class="time-box">
                    <strong id="years">--</strong>
                    <span>années</span>
                </div>
                <div class="time-box">
                    <strong id="months">--</strong>
                    <span>mois</span>
                </div>
                <div class="time-box">
                    <strong id="days">--</strong>
                    <span>jours</span>
                </div>
                <div class="time-box">
                    <strong id="hours">--</strong>
                    <span>heures</span>
                </div>
                <div class="time-box">
                    <strong id="minutes">--</strong>
                    <span>minutes</span>
                </div>
                <div class="time-box">
                    <strong id="seconds">--</strong>
                    <span>secondes</span>
                </div>
            </div>

            <p class="total-days" id="totalDays">Soit ... jours d'amour.</p>

            <a class="button" href="media.html">
                <span>Revivre cette journée</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h14m-6-6 6 6-6 6" />
                </svg>
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
